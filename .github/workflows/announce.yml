name: Announce release

# Reusable across every BaryoDev repo: posts a release to the org's Announcements discussions.
# Call it from a repo's publish workflow (see this repo's README for the snippet). Idempotent —
# a release with the same title is announced only once.
on:
  workflow_call:
    inputs:
      package:
        description: 'Human name of the thing shipped, e.g. "@baryodev/pwa-kit" or "barako-cms (docker)".'
        required: true
        type: string
      version:
        description: 'Version or tag, e.g. "v0.3.0" (a leading v is trimmed).'
        required: true
        type: string
      notes:
        description: "Release notes (markdown). Falls back to a one-liner."
        required: false
        type: string
        default: ""
      install:
        description: "Optional install/pull command shown in a code block."
        required: false
        type: string
        default: ""
    secrets:
      ANNOUNCE_TOKEN:
        description: "PAT with Discussions read/write on BaryoDev/.github."
        required: true
      DISCORD_WEBHOOK:
        description: "Discord channel webhook URL. Optional — when set, the release is also posted to Discord."
        required: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Post to org announcements
        # Best-effort: announcing is a courtesy, never a release gate. If the discussion post fails
        # (permissions, API hiccup), log it and pass so the caller's publish stays green.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ANNOUNCE_TOKEN }}
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ inputs.version }}
          NOTES: ${{ inputs.notes }}
          INSTALL: ${{ inputs.install }}
        run: |
          set -euo pipefail
          VER="${VERSION#v}"
          TITLE="$PACKAGE v$VER"
          REPO_ID="R_kgDOQwINlA"          # BaryoDev/.github
          CAT_ID="DIC_kwDOQwINlM4C0ZbS"    # Announcements

          # Idempotency: skip if a discussion with this exact title already exists. We list the
          # repo's recent discussions rather than the global search API, which a fine-grained token
          # scoped only to Discussions can't access.
          TITLES=$(gh api graphql \
            -f query='query{repository(owner:"BaryoDev",name:".github"){discussions(first:100, orderBy:{field:CREATED_AT, direction:DESC}){nodes{title}}}}' \
            --jq '.data.repository.discussions.nodes[].title' || true)
          if printf '%s\n' "$TITLES" | grep -Fxq "$TITLE"; then
            echo "Already announced: $TITLE"
            exit 0
          fi

          BODY="${NOTES:-Released $PACKAGE v$VER.}"
          if [ -n "${INSTALL}" ]; then
            BODY="$BODY"$'\n\n**Install**\n```\n'"$INSTALL"$'\n```'
          fi
          BODY="$BODY"$'\n\n_Posted automatically on publish._'

          URL=$(gh api graphql \
            -f query='mutation($r:ID!,$c:ID!,$t:String!,$b:String!){createDiscussion(input:{repositoryId:$r,categoryId:$c,title:$t,body:$b}){discussion{url}}}' \
            -f r="$REPO_ID" -f c="$CAT_ID" -f t="$TITLE" -f b="$BODY" \
            --jq '.data.createDiscussion.discussion.url')
          echo "Announced: $URL"

      - name: Post to Discord
        # Best-effort like the discussion post above — a Discord hiccup never gates a release. Skips
        # silently when no webhook secret is configured, so repos that don't want Discord are unaffected.
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ inputs.version }}
          NOTES: ${{ inputs.notes }}
          INSTALL: ${{ inputs.install }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "No DISCORD_WEBHOOK configured; skipping Discord announcement."
            exit 0
          fi

          VER="${VERSION#v}"
          DESC="${NOTES:-Released $PACKAGE v$VER.}"
          # Discord embed descriptions cap at 4096 characters; leave room for the install block.
          DESC="${DESC:0:3600}"
          if [ -n "${INSTALL}" ]; then
            DESC="$DESC"$'\n\n**Install**\n```\n'"$INSTALL"$'\n```'
          fi

          # Build the JSON with jq so notes containing quotes/newlines/backticks are encoded safely.
          # Colour 35514 = #008cba (Barako blue). content pings the channel; embed carries the detail.
          PAYLOAD=$(jq -n \
            --arg t "$PACKAGE v$VER" \
            --arg d "$DESC" \
            '{content: ("**" + $t + "** released"),
              embeds: [{title: $t, description: $d, color: 35514}]}')

          # Discord returns 204 on success. Fail soft (continue-on-error covers a hard failure too).
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK")
          echo "Discord responded $code"
          [ "$code" = "204" ] || echo "Non-204 from Discord (non-fatal)."
